<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- 三叶草 -->
  <g>
    <!-- 茎 -->
    <rect fill="#4A8C2A" x="28" y="38" width="4" height="16" rx="2"/>
    <!-- 三片叶子 -->
    <ellipse fill="#4CAF50" cx="30" cy="18" rx="9" ry="7" transform="rotate(0,30,18)"/>
    <ellipse fill="#4CAF50" cx="16" cy="30" rx="9" ry="7" transform="rotate(-60,16,30)"/>
    <ellipse fill="#4CAF50" cx="44" cy="30" rx="9" ry="7" transform="rotate(60,44,30)"/>
    <!-- 叶脉 -->
    <line x1="30" y1="12" x2="30" y2="24" stroke="#2E7D32" stroke-width="0.8"/>
    <line x1="10" y1="26" x2="22" y2="34" stroke="#2E7D32" stroke-width="0.8"/>
    <line x1="38" y1="26" x2="50" y2="34" stroke="#2E7D32" stroke-width="0.8"/>
    <!-- 中心 -->
    <circle fill="#2E7D32" cx="30" cy="26" r="4"/>
    <!-- 风线条 -->
    <line x1="48" y1="18" x2="56" y2="16" stroke="#AADDAA" stroke-width="1.5" opacity="0.6"/>
    <line x1="48" y1="28" x2="58" y2="27" stroke="#AADDAA" stroke-width="1.5" opacity="0.6"/>
    <line x1="48" y1="38" x2="54" y2="37" stroke="#AADDAA" stroke-width="1.5" opacity="0.6"/>
  </g>
</svg>
