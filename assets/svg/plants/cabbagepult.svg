<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <style>
    @keyframes load { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-10deg)} }
    .base { fill:#8B6914; }
    .arm { fill:#7A5A10; }
    .cabbage { fill:#4CAF50; }
    .leaf { fill:#3D7A1F; }
    .dark { fill:#388E3C; }
    .eye { fill:#fff; }
    .pupil { fill:#000; }
    .load { animation: load 2s ease-in-out infinite; transform-origin: 30px 40px; }
  </style>
  <g class="load">
    <ellipse class="base" cx="30" cy="50" rx="20" ry="7"/>
    <rect class="base" x="27" y="28" width="6" height="24" rx="2"/>
    <rect class="arm" x="12" y="26" width="36" height="5" rx="2"/>
    <ellipse class="arm" cx="44" cy="24" rx="8" ry="5"/>
    <circle class="cabbage" cx="44" cy="22" r="9"/>
    <circle cx="42" cy="20" r="4" fill="#66BB6A" opacity="0.6"/>
    <line x1="44" y1="14" x2="44" y2="30" stroke="#388E3C" stroke-width="0.8" opacity="0.5"/>
    <line x1="37" y1="22" x2="51" y2="22" stroke="#388E3C" stroke-width="0.8" opacity="0.5"/>
    <ellipse class="leaf" cx="14" cy="38" rx="8" ry="3"/>
    <ellipse class="leaf" cx="46" cy="42" rx="8" ry="3"/>
    <circle class="eye" cx="26" cy="24" r="3"/>
    <circle class="eye" cx="34" cy="24" r="3"/>
    <circle class="pupil" cx="27" cy="24" r="1.5"/>
    <circle class="pupil" cx="35" cy="24" r="1.5"/>
  </g>
</svg>
