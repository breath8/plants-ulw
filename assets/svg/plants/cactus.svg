<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- 仙人掌 -->
  <g>
    <!-- 身体 -->
    <rect fill="#2A8A3A" x="18" y="8" width="24" height="42" rx="10"/>
    <!-- 高光 -->
    <rect fill="#4AAA5A" x="20" y="10" width="10" height="38" rx="6" opacity="0.5"/>
    <!-- 刺 -->
    <polygon fill="#D4C8A0" points="16,16 12,14 16,20"/>
    <polygon fill="#D4C8A0" points="44,20 48,18 44,24"/>
    <polygon fill="#D4C8A0" points="16,32 12,30 16,36"/>
    <polygon fill="#D4C8A0" points="44,28 48,26 44,34"/>
    <polygon fill="#D4C8A0" points="16,44 12,42 14,48"/>
    <polygon fill="#D4C8A0" points="44,40 48,38 46,44"/>
    <!-- 顶部花 -->
    <circle fill="#FF4444" cx="30" cy="8" r="6"/>
    <circle fill="#FF6666" cx="29" cy="7" r="3" opacity="0.6"/>
    <!-- 眼睛 -->
    <ellipse fill="#FFF" cx="26" cy="24" rx="3" ry="4"/>
    <ellipse fill="#FFF" cx="34" cy="24" rx="3" ry="4"/>
    <circle fill="#000" cx="27" cy="25" r="2"/>
    <circle fill="#000" cx="35" cy="25" r="2"/>
    <!-- 嘴 -->
