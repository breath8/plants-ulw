<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100">
  <style>
    @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    .cherry { fill:#cc2200; }
    .highlight { fill:#ff6644; }
    .stem { fill:#4a8c2a; }
    .eye { fill:#fff; }
    .pupil { fill:#000; }
    .leaf { fill:#3d7a1f; }
    .bob { animation: bob 1s ease-in-out infinite; }
  </style>
  <g class="bob">
    <!-- 茎 -->
    <path class="stem" d="M40,20 Q40,10 50,5" stroke="#4a8c2a" stroke-width="3" fill="none"/>
    <ellipse class="leaf" cx="52" cy="8" rx="8" ry="4" transform="rotate(20,52,8)"/>
    <!-- 左樱桃 -->
    <circle class="cherry" cx="30" cy="50" r="20"/>
    <circle class="highlight" cx="24" cy="42" r="6" opacity="0.4"/>
    <circle class="eye" cx="26" cy="46" r="3"/>
    <circle class="pupil" cx="27" cy="46" r="1.5"/>
    <circle class="eye" cx="34" cy="46" r="3"/>
    <circle class="pupil" cx="35" cy="46" r="1.5"/>
    <path d="M26,54 Q30,58 34,54" stroke="#800" stroke-width="1.5" fill="none"/>
    <!-- 右樱桃 -->
    <circle class="cherry" cx="50" cy="50" r="20"/>
    <circle class="highlight" cx="44" cy="42" r="6" opacity="0.4"/>
    <circle class="eye" cx="46" cy="46" r="3"/>
    <circle class="pupil" cx="47" cy="46" r="1.5"/>
    <circle class="eye" cx="54" cy="46" r="3"/>
    <circle class="pupil" cx="55" cy="46" r="1.5"/>
    <path d="M46,54 Q50,58 54,54" stroke="#800" stroke-width="1.5" fill="none"/>
    <!-- 连接线 -->
    <path class="stem" d="M30,30 Q40,15 50,30" stroke="#4a8c2a" stroke-width="2" fill="none"/>
  </g>
</svg>
