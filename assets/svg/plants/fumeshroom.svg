<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100">
  <style>
    @keyframes sway { 0%,100%{transform:rotate(-1deg)} 50%{transform:rotate(1deg)} }
    @keyframes puff { 0%,100%{opacity:0.3;r:4} 50%{opacity:0.6;r:7} }
    .stem { fill:#4a5a6a; }
    .cap { fill:#6a4a8a; }
    .cap-dark { fill:#4a2a6a; }
    .spot { fill:#8a6aaa; }
    .mouth { fill:#3a2a5a; }
    .smoke { fill:#8a6aaa; animation: puff 1.5s ease-in-out infinite; }
    .sway { animation: sway 2s ease-in-out infinite; transform-origin: 40px 85px; }
  </style>
  <g class="sway">
    <rect class="stem" x="36" y="55" width="8" height="30" rx="3"/>
    <!-- 菌盖 -->
    <ellipse class="cap" cx="40" cy="38" rx="28" ry="22"/>
    <ellipse class="cap-dark" cx="40" cy="35" rx="24" ry="18"/>
    <!-- 斑点 -->
    <circle class="spot" cx="30" cy="28" r="4"/>
    <circle class="spot" cx="45" cy="25" r="3"/>
    <circle class="spot" cx="35" cy="35" r="3"/>
    <circle class="spot" cx="50" cy="32" r="3.5"/>
    <!-- 眼睛 -->
    <circle cx="34" cy="42" r="4" fill="#fff"/>
    <circle cx="46" cy="42" r="4" fill="#fff"/>
    <circle cx="34" cy="42" r="2" fill="#000"/>
    <circle cx="46" cy="42" r="2" fill="#000"/>
    <!-- 嘴 -->
    <ellipse class="mouth" cx="40" cy="52" rx="8" ry="4"/>
    <!-- 烟雾 -->
    <circle class="smoke" cx="58" cy="40" r="4"/>
    <circle class="smoke" cx="65" cy="35" r="3" style="animation-delay:0.5s"/>
    <circle class="smoke" cx="62" cy="28" r="4" style="animation-delay:1s"/>
  </g>
</svg>
