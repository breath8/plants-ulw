<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <style>
    @keyframes flame { 0%,100%{transform:scaleY(1)} 50%{transform:scaleY(1.1)} }
    .body { fill:#CC0000; }
    .body-hi { fill:#FF2200; }
    .tip { fill:#AA0000; }
    .stem { fill:#4A8C2A; }
    .leaf { fill:#3D7A1F; }
    .eye { fill:#fff; }
    .pupil { fill:#000; }
    .flame1 { fill:#FF4400; }
    .flame2 { fill:#FF8800; }
    .flame3 { fill:#FFCC00; }
    .flame { animation: flame 0.3s ease-in-out infinite alternate; }
  </style>
  <g>
    <ellipse class="body" cx="30" cy="32" rx="8" ry="16"/>
    <ellipse class="body-hi" cx="28" cy="30" rx="5" ry="12" opacity="0.6"/>
    <polygon class="tip" points="27,48 33,48 30,54"/>
    <rect class="stem" x="28" y="10" width="4" height="6" rx="1"/>
    <ellipse class="leaf" cx="24" cy="12" rx="4" ry="2"/>
    <ellipse class="leaf" cx="36" cy="12" rx="4" ry="2"/>
    <ellipse class="eye" cx="28" cy="28" rx="3" ry="3.5"/>
    <ellipse class="eye" cx="32" cy="28" rx="3" ry="3.5"/>
    <circle class="pupil" cx="28" cy="29" r="1.5"/>
    <circle class="pupil" cx="33" cy="29" r="1.5"/>
    <polyline class="flame" points="26,16 30,8 34,16" fill="#FF4400" opacity="0.8"/>
    <polyline class="flame" points="28,16 30,10 32,16" fill="#FF8800" opacity="0.7"/>
    <polyline class="flame" points="29,16 30,12 31,16" fill="#FFCC00" opacity="0.6"/>
  </g>
</svg>