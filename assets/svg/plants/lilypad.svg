<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <style>
    @keyframes sway { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    .water { fill:#4A90D9; opacity:0.3; }
    .leaf { fill:#3D9B2F; }
    .leaf-dark { fill:#2D7A1F; }
    .vein { stroke:#2D7A1F; stroke-width:0.8; fill:none; }
    .sway { animation: sway 1.5s ease-in-out infinite; transform-origin: 30px 45px; }
  </style>
  <g class="sway">
    <ellipse class="water" cx="30" cy="48" rx="28" ry="8"/>
    <ellipse class="leaf" cx="30" cy="35" rx="24" ry="10"/>
    <ellipse class="leaf-dark" cx="24" cy="33" rx="8" ry="6"/>
    <line class="vein" x1="12" y1="35" x2="48" y2="35"/>
    <line class="vein" x1="22" y1="35" x2="26" y2="30"/>
    <line class="vein" x1="38" y1="35" x2="34" y2="30"/>
    <line class="vein" x1="30" y1="35" x2="24" y2="40"/>
    <line class="vein" x1="30" y1="35" x2="36" y2="40"/>
    <polygon fill="#4A90D9" points="48,35 54,31 54,39"/>
    <ellipse fill="#5DBF4F" opacity="0.5" cx="24" cy="31" rx="6" ry="3"/>
  </g>
</svg>