<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <style>
    @keyframes sway { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
    .stem { fill:#4A8C2A; }
    .petal1 { fill:#FFA000; }
    .petal2 { fill:#FF8F00; }
    .center { fill:#E65100; }
    .texture { fill:#BF360C; opacity:0.4; }
    .leaf { fill:#3D7A1F; }
    .eye { fill:#fff; }
    .pupil { fill:#000; }
    .smile { fill:none; stroke:#BF360C; stroke-width:1.2; }
    .cheek { fill:#FF6F00; opacity:0.3; }
    .sway { animation: sway 1.5s ease-in-out infinite; transform-origin: 30px 55px; }
  </style>
  <g class="sway">
    <rect class="stem" x="28" y="38" width="4" height="16" rx="1"/>
    <ellipse class="leaf" cx="22" cy="46" rx="7" ry="3"/>
    <ellipse class="leaf" cx="38" cy="48" rx="7" ry="3"/>
    <ellipse class="petal1" cx="30" cy="20" rx="5" ry="9" transform="rotate(0,30,20)"/>
    <ellipse class="petal2" cx="30" cy="20" rx="5" ry="9" transform="rotate(30,30,20)"/>
    <ellipse class="petal1" cx="30" cy="20" rx="5" ry="9" transform="rotate(60,30,20)"/>
    <ellipse class="petal2" cx="30" cy="20" rx="5" ry="9" transform="rotate(90,30,20)"/>
    <ellipse class="petal1" cx="30" cy="20" rx="5" ry="9" transform="rotate(120,30,20)"/>
    <ellipse class="petal2" cx="30" cy="20" rx="5" ry="9" transform="rotate(150,30,20)"/>
    <circle class="center" cx="30" cy="20" r="7"/>
    <circle class="texture" cx="28" cy="18" r="2.5"/>
    <circle class="texture" cx="32" cy="19" r="1.5"/>
    <circle class="eye" cx="27" cy="18" r="2"/>
    <circle class="eye" cx="33" cy="18" r="2"/>
    <circle class="pupil" cx="27" cy="18" r="1"/>
    <circle class="pupil" cx="33" cy="18" r="1"/>
    <path class="smile" d="M28,22 Q30,25 32,22"/>
    <circle class="cheek" cx="24" cy="21" r="2"/>
    <circle class="cheek" cx="36" cy="21" r="2"/>
  </g>
</svg>
