<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <style>
    @keyframes load { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(-15deg)} }
    .base { fill:#6B4F10; }
    .arm { fill:#5A3E0A; }
    .melon { fill:#2E7D32; }
    .stripe { fill:none; stroke:#1B5E20; stroke-width:1.5; opacity:0.6; }
    .leaf { fill:#2D6A2A; }
    .eye { fill:#fff; }
    .pupil { fill:#1B5E20; }
    .load { animation: load 2.5s ease-in-out infinite; transform-origin: 30px 40px; }
  </style>
  <g class="load">
    <ellipse class="base" cx="30" cy="50" rx="22" ry="8"/>
    <rect class="arm" x="26" y="26" width="8" height="26" rx="2"/>
    <rect class="arm" x="10" y="24" width="40" height="7" rx="3"/>
    <ellipse cx="46" cy="22" rx="10" ry="7" fill="#6B4F10"/>
    <circle class="melon" cx="46" cy="20" r="12"/>
    <line class="stripe" x1="46" y1="9" x2="46" y2="31"/>
    <path class="stripe" d="M46,20 Q54,14 50,20 Q54,26 46,20"/>
    <circle cx="42" cy="16" r="4" fill="#4CAF50" opacity="0.4"/>
    <ellipse class="leaf" cx="12" cy="36" rx="9" ry="3"/>
    <ellipse class="leaf" cx="48" cy="42" rx="9" ry="3"/>
    <circle class="eye" cx="24" cy="24" r="4"/>
    <circle class="eye" cx="34" cy="24" r="4"/>
    <circle class="pupil" cx="25" cy="24" r="2.5"/>
    <circle class="pupil" cx="35" cy="24" r="2.5"/>
  </g>
</svg>
