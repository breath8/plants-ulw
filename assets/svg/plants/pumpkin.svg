<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- 南瓜头 -->
  <g>
    <!-- 南瓜外壳 -->
    <ellipse fill="#E88A10" cx="30" cy="32" rx="25" ry="24"/>
    <!-- 棱线 -->
    <line x1="30" y1="10" x2="30" y2="54" stroke="#C06A00" stroke-width="2" opacity="0.4"/>
    <line x1="16" y1="12" x2="16" y2="52" stroke="#C06A00" stroke-width="2" opacity="0.4"/>
    <line x1="44" y1="12" x2="44" y2="52" stroke="#C06A00" stroke-width="2" opacity="0.4"/>
    <!-- 高光 -->
    <ellipse fill="#F5A830" cx="22" cy="22" rx="8" ry="10" opacity="0.5"/>
    <!-- 蒂 -->
    <rect fill="#4A8C2A" x="28" y="6" width="4" height="6" rx="2"/>
    <ellipse fill="#3D7A1F" cx="34" cy="8" rx="5" ry="2"/>
    <!-- 眼睛 -->
    <polygon fill="#000" points="18,24 26,24 22,30"/>
    <polygon fill="#000" points="34,24 42,24 38,30"/>
    <!-- 锯齿嘴 -->
    <polyline fill="none" stroke="#000" stroke-width="2" points="18,40 22,36 26,42 30,36 34,42 38,36 42,40"/>
  </g>
</svg>
