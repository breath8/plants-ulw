<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100">
  <style>
    @keyframes sway { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    .stem { fill:#4a8c2a; }
    .head { fill:#6abf3a; }
    .dark { fill:#3d7a1f; }
    .eye { fill:#fff; }
    .pupil { fill:#000; }
    .mouth { fill:#2d5a1b; }
    .sway { animation: sway 1.5s ease-in-out infinite; transform-origin: 40px 80px; }
  </style>
  <g class="sway">
    <rect class="stem" x="36" y="55" width="8" height="30" rx="3"/>
    <ellipse class="dark" cx="28" cy="65" rx="12" ry="5" transform="rotate(-30,28,65)"/>
    <ellipse class="dark" cx="52" cy="70" rx="12" ry="5" transform="rotate(30,52,70)"/>
    <!-- 后头 -->
    <circle class="head" cx="35" cy="38" r="18"/>
    <!-- 前头 -->
    <circle class="head" cx="48" cy="35" r="20"/>
    <ellipse class="dark" cx="62" cy="37" rx="8" ry="7"/>
    <!-- 后眼 -->
    <ellipse class="eye" cx="30" cy="34" rx="5" ry="6"/>
    <circle class="pupil" cx="31" cy="34" r="3"/>
    <!-- 前眼 -->
    <ellipse class="eye" cx="44" cy="30" rx="6" ry="7"/>
    <circle class="pupil" cx="46" cy="30" r="3.5"/>
    <!-- 嘴 -->
    <ellipse class="mouth" cx="60" cy="37" rx="6" ry="3"/>
  </g>
</svg>
