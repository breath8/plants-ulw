<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <!-- 海蘑菇 -->
  <g>
    <!-- 茎 -->
    <rect fill="#5A8A7A" x="26" y="42" width="8" height="14" rx="3"/>
    <!-- 水波纹 -->
    <path d="M10 52 Q16 48 22 52 Q30 48 38 52 Q46 48 50 52" fill="none" stroke="#4AA8D8" stroke-width="1" opacity="0.5"/>
    <!-- 菌帽（贝壳形） -->
    <ellipse fill="#7ABAB0" cx="30" cy="30" rx="23" ry="17"/>
    <!-- 贝壳条纹 -->
    <line x1="22" y1="16" x2="22" y2="42" stroke="#5A9A90" stroke-width="1.5" opacity="0.5"/>
    <line x1="30" y1="14" x2="30" y2="44" stroke="#5A9A90" stroke-width="1.5" opacity="0.5"/>
    <line x1="38" y1="16" x2="38" y2="42" stroke="#5A9A90" stroke-width="1.5" opacity="0.5"/>
    <!-- 高光 -->
    <ellipse fill="#A0DAD0" cx="25" cy="26" rx="12" ry="8" opacity="0.5"/>
    <!-- 斑点 -->
    <circle fill="#FFF" cx="22" cy="24" r="2.5"/>
    <circle fill="#FFF" cx="34" cy="20" r="2"/>
    <circle fill="#FFF" cx="40" cy="28" r="2"/>
    <!-- 底部阴影 -->
    <ellipse fill="#4A7A70" cx="30" cy="44" rx="18" ry="4"/>
    <!-- 眼睛 -->
    <ellipse fill="#FFF" cx="24" cy="28" rx="4" ry="5"/>
    <ellipse fill="#FFF" cx="36" cy="28" rx="4" ry="5"/>
    <circle fill="#000" cx="25" cy="29" r="2.5"/>
    <circle fill="#000" cx="37" cy="29" r="2.5"/>
  </g>
</svg>
