<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <style>
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-2px)} }
    .body { fill:#D4A030; }
    .body-dark { fill:#C49020; }
    .ridge { stroke:#B8881A; stroke-width:1; fill:none; }
    .stem { fill:#4A8C2A; }
    .leaf { fill:#3D7A1F; }
    .eye { fill:#fff; }
    .pupil { fill:#000; }
    .brow { stroke:#000; stroke-width:1.5; fill:none; }
    .mouth { stroke:#000; stroke-width:1; fill:none; }
    .bounce { animation: bounce 1s ease-in-out infinite; }
  </style>
  <g class="bounce">
    <circle class="body" cx="30" cy="35" r="16"/>
    <line class="ridge" x1="24" y1="20" x2="24" y2="50"/>
    <line class="ridge" x1="36" y1="20" x2="36" y2="50"/>
    <ellipse class="body-dark" cx="25" cy="38" rx="8" ry="6" opacity="0.3"/>
    <rect class="stem" x="28" y="12" width="4" height="8" rx="1"/>
    <ellipse class="leaf" cx="24" cy="14" rx="5" ry="2"/>
    <ellipse class="leaf" cx="36" cy="14" rx="5" ry="2"/>
    <ellipse class="eye" cx="25" cy="32" rx="4" ry="5"/>
    <ellipse class="eye" cx="35" cy="32" rx="4" ry="5"/>
    <circle class="pupil" cx="26" cy="33" r="2"/>
    <circle class="pupil" cx="36" cy="33" r="2"/>
    <line class="brow" x1="21" y1="26" x2="28" y2="28"/>
    <line class="brow" x1="39" y1="26" x2="32" y2="28"/>
    <line class="mouth" x1="25" y1="42" x2="35" y2="42"/>
  </g>
</svg>