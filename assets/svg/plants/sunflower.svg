<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100">
  <style>
    @keyframes sway { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    .stem { fill:#4a8c2a; }
    .petal { fill:#f5c842; }
    .petal2 { fill:#e6b520; }
    .center { fill:#5a3810; }
    .face { fill:#3d2200; }
    .leaf { fill:#3d7a1f; }
    .sway { animation: sway 2s ease-in-out infinite; transform-origin: 40px 85px; }
  </style>
  <g class="sway">
    <rect class="stem" x="37" y="55" width="6" height="30" rx="2"/>
    <ellipse class="leaf" cx="28" cy="65" rx="10" ry="4" transform="rotate(-30,28,65)"/>
    <ellipse class="leaf" cx="52" cy="70" rx="10" ry="4" transform="rotate(30,52,70)"/>
    <!-- 花瓣 -->
    <ellipse class="petal" cx="40" cy="18" rx="6" ry="14"/>
    <ellipse class="petal" cx="40" cy="18" rx="6" ry="14" transform="rotate(45,40,35)"/>
    <ellipse class="petal" cx="40" cy="18" rx="6" ry="14" transform="rotate(90,40,35)"/>
    <ellipse class="petal" cx="40" cy="18" rx="6" ry="14" transform="rotate(135,40,35)"/>
    <ellipse class="petal2" cx="40" cy="18" rx="6" ry="14" transform="rotate(22,40,35)"/>
    <ellipse class="petal2" cx="40" cy="18" rx="6" ry="14" transform="rotate(67,40,35)"/>
    <ellipse class="petal2" cx="40" cy="18" rx="6" ry="14" transform="rotate(112,40,35)"/>
    <ellipse class="petal2" cx="40" cy="18" rx="6" ry="14" transform="rotate(157,40,35)"/>
    <!-- 花心 -->
    <circle class="center" cx="40" cy="35" r="14"/>
    <!-- 笑脸 -->
    <circle cx="35" cy="32" r="3" fill="#fff"/>
    <circle cx="45" cy="32" r="3" fill="#fff"/>
    <circle cx="35" cy="32" r="1.5" fill="#000"/>
    <circle cx="45" cy="32" r="1.5" fill="#000"/>
    <path d="M35,39 Q40,44 45,39" stroke="#000" stroke-width="1.5" fill="none"/>
    <!-- 腮红 -->
    <circle cx="30" cy="37" r="4" fill="#f5a0a0" opacity="0.5"/>
    <circle cx="50" cy="37" r="4" fill="#f5a0a0" opacity="0.5"/>
  </g>
</svg>
