<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100">
  <!-- 阳光菇 -->
  <style>
    @keyframes sway { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    .sway { animation: sway 2s ease-in-out infinite; transform-origin: 40px 80px; }
  </style>
  <g class="sway">
    <!-- 茎 -->
    <rect fill="#D4A847" x="36" y="58" width="8" height="24" rx="3"/>
    <!-- 菌帽 -->
    <ellipse fill="#F5C842" cx="40" cy="38" rx="22" ry="18"/>
    <!-- 菌帽高光 -->
    <ellipse fill="#FFE066" cx="36" cy="32" rx="14" ry="10"/>
    <!-- 笑脸 -->
    <circle fill="#FFFFFF" cx="33" cy="34" r="3"/>
    <circle fill="#FFFFFF" cx="47" cy="34" r="3"/>
    <circle fill="#000000" cx="34" cy="34" r="1.5"/>
    <circle fill="#000000" cx="48" cy="34" r="1.5"/>
    <!-- 嘴 -->
    <path fill="none" stroke="#000000" stroke-width="1.5" d="M35,42 Q40,47 45,42"/>
    <!-- 叶子 -->
    <ellipse fill="#B8960A" cx="26" cy="68" rx="10" ry="4" transform="rotate(-20,26,68)"/>
    <ellipse fill="#B8960A" cx="54" cy="70" rx="10" ry="4" transform="rotate(20,54,70)"/>
  </g>
</svg>
