<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <style>
    @keyframes wave { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
    .vine { stroke:#2E8B57; stroke-width:2.5; fill:none; stroke-linecap:round; }
    .leaf { fill:#3D9B2F; }
    .circle { stroke:#2E8B57; stroke-width:1.5; fill:none; }
    .water { fill:#4A90D9; opacity:0.2; }
    .wave { animation: wave 1.2s ease-in-out infinite; transform-origin: 30px 50px; }
  </style>
  <g class="wave">
    <ellipse class="water" cx="30" cy="50" rx="22" ry="6"/>
    <path class="vine" d="M25,48 C22,40 27,32 30,22 C33,16 30,10 28,6"/>
    <path class="vine" d="M35,48 C38,38 33,30 30,20 C27,14 30,8 32,4"/>
    <ellipse class="leaf" cx="22" cy="30" rx="5" ry="2.5" transform="rotate(-20,22,30)"/>
    <ellipse class="leaf" cx="38" cy="28" rx="5" ry="2.5" transform="rotate(20,38,28)"/>
    <ellipse class="leaf" cx="27" cy="14" rx="4" ry="2"/>
    <ellipse class="leaf" cx="33" cy="12" rx="4" ry="2"/>
    <circle class="circle" cx="30" cy="28" r="8"/>
    <circle cx="30" cy="22" r="3" fill="#2E8B57" opacity="0.5"/>
  </g>
</svg>