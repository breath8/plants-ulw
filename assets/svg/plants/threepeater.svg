<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60">
  <style>
    @keyframes sway { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    .stem { fill:#4A8C2A; }
    .head { fill:#6ABF3A; }
    .head-side { fill:#5AAE2A; }
    .dark { fill:#3D7A1F; }
    .mouth { fill:#2D5A1B; }
    .eye { fill:#fff; }
    .pupil { fill:#000; }
    .sway { animation: sway 1.5s ease-in-out infinite; transform-origin: 30px 55px; }
  </style>
  <g class="sway">
    <rect class="stem" x="27" y="42" width="6" height="16" rx="2"/>
    <ellipse class="dark" cx="18" cy="48" rx="10" ry="4" transform="rotate(-30,18,48)"/>
    <ellipse class="dark" cx="42" cy="50" rx="10" ry="4" transform="rotate(30,42,50)"/>
    <circle class="head" cx="30" cy="28" r="14"/>
    <circle class="head-side" cx="16" cy="22" r="9"/>
    <circle class="head-side" cx="44" cy="22" r="9"/>
    <ellipse class="mouth" cx="40" cy="30" rx="7" ry="4"/>
    <ellipse cx="20" cy="20" rx="6" ry="7" fill="#fff"/>
    <circle class="pupil" cx="21" cy="21" r="2.5"/>
    <circle cx="16" cy="21" r="3" fill="#fff"/>
    <circle cx="15" cy="21" r="1.5" fill="#000"/>
    <circle cx="44" cy="21" r="3" fill="#fff"/>
    <circle cx="45" cy="21" r="1.5" fill="#000"/>
  </g>
</svg>