<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100">
  <style>
    @keyframes sway { 0%,100%{transform:rotate(-1deg)} 50%{transform:rotate(1deg)} }
    .shell { fill:#8B6914; }
    .shell-dark { fill:#6B4F10; }
    .crack { stroke:#4a3a08; stroke-width:1.5; fill:none; }
    .face { fill:#5a3810; }
    .sway { animation: sway 2s ease-in-out infinite; transform-origin: 40px 90px; }
  </style>
  <g class="sway">
    <!-- 身体 -->
    <ellipse class="shell" cx="40" cy="55" rx="25" ry="35"/>
    <ellipse class="shell-dark" cx="40" cy="55" rx="20" ry="30" opacity="0.3"/>
    <!-- 纹理线条 -->
    <path class="crack" d="M25,40 Q30,50 28,60"/>
    <path class="crack" d="M55,40 Q50,50 52,60"/>
    <path class="crack" d="M35,30 Q40,40 38,50"/>
    <path class="crack" d="M45,30 Q40,40 42,50"/>
    <!-- 裂缝 -->
    <path stroke="#5a4510" stroke-width="2" fill="none" d="M32,45 L36,50 L33,55"/>
    <path stroke="#5a4510" stroke-width="2" fill="none" d="M48,45 L44,50 L47,55"/>
    <!-- 眼睛 -->
    <circle cx="33" cy="42" r="4" fill="#fff"/>
    <circle cx="47" cy="42" r="4" fill="#fff"/>
    <circle cx="33" cy="42" r="2" fill="#000"/>
    <circle cx="47" cy="42" r="2" fill="#000"/>
    <!-- 嘴巴 -->
    <path d="M35,52 Q40,56 45,52" stroke="#3a2500" stroke-width="2" fill="none"/>
    <!-- 头顶 -->
    <ellipse cx="40" cy="24" rx="8" ry="4" fill="#6B4F10"/>
  </g>
</svg>
