<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 100">
  <style>
    @keyframes walk { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
    .skin { fill:#7B8B6F; }
    .shirt { fill:#FF1493; }
    .pants { fill:#4A0080; }
    .eye { fill:#fff; }
    .pupil { fill:#c00; }
    .afro { fill:#1a1a1a; }
    .sunglasses { fill:#222; }
    .walk { animation: walk 0.6s ease-in-out infinite; transform-origin: 30px 50px; }
  </style>
  <g class="walk">
    <ellipse class="afro" cx="30" cy="10" rx="18" ry="14"/>
    <circle class="skin" cx="30" cy="18" r="14"/>
    <rect class="sunglasses" x="18" y="13" width="24" height="6" rx="2"/>
    <circle class="eye" cx="25" cy="16" r="3" fill="#0ff"/>
    <circle class="eye" cx="35" cy="16" r="3" fill="#0ff"/>
    <ellipse cx="30" cy="24" rx="6" ry="3" fill="#4a3a2a"/>
    <rect class="shirt" x="18" y="30" width="24" height="28" rx="3"/>
    <polygon fill="#FF69B4" points="30,30 26,45 30,42 34,45"/>
    <rect class="skin" x="8" y="30" width="8" height="28" rx="3" transform="rotate(20,12,30)"/>
    <rect class="skin" x="44" y="30" width="8" height="28" rx="3" transform="rotate(-20,48,30)"/>
    <rect class="pants" x="20" y="56" width="8" height="25" rx="3"/>
    <rect class="pants" x="32" y="56" width="8" height="25" rx="3"/>
    <rect fill="#3a0060" x="18" y="78" width="12" height="6" rx="2"/>
    <rect fill="#3a0060" x="30" y="78" width="12" height="6" rx="2"/>
    <circle cx="12" cy="38" r="3" fill="#FFD700"/>
    <circle cx="48" cy="38" r="3" fill="#FFD700"/>
  </g>
</svg>
