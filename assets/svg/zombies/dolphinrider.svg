<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80">
  <style>
    @keyframes ride { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    .skin { fill:#7B8B6F; }
    .shirt { fill:#8B6914; }
    .dolphin { fill:#6699BB; }
    .dolphin-dark { fill:#5588AA; }
    .dolphin-belly { fill:#99CCDD; opacity:0.4; }
    .ride { animation: ride 0.7s ease-in-out infinite; transform-origin: 30px 50px; }
  </style>
  <g class="ride">
    <!-- 海豚 -->
    <ellipse class="dolphin" cx="30" cy="56" rx="24" ry="9"/>
    <ellipse class="dolphin-dark" cx="14" cy="54" rx="10" ry="7"/>
    <ellipse cx="8" cy="56" rx="4" ry="2.5" fill="#447799"/>
    <circle cx="12" cy="52" r="2" fill="#fff"/>
    <circle cx="13" cy="52" r="1" fill="#000"/>
    <polygon class="dolphin-dark" points="26,48 30,42 34,48"/>
    <polygon class="dolphin" points="46,54 54,48 54,60"/>
    <ellipse class="dolphin-belly" cx="30" cy="58" rx="18" ry="4"/>
    <!-- 僵尸身体 -->
    <circle class="skin" cx="30" cy="28" r="10"/>
    <circle cx="26" cy="26" r="2.5" fill="#fff"/>
    <circle cx="34" cy="26" r="2.5" fill="#fff"/>
    <circle cx="27" cy="26" r="1.2" fill="#c00"/>
    <circle cx="35" cy="26" r="1.2" fill="#c00"/>
    <ellipse cx="30" cy="32" rx="4" ry="2" fill="#4a3a2a"/>
    <rect class="shirt" x="20" y="36" width="20" height="18" rx="3"/>
    <polygon fill="#6a4a0a" points="30,36 28,46 30,44 32,46"/>
    <rect class="skin" x="12" y="38" width="7" height="14" rx="2"/>
    <rect class="skin" x="41" y="38" width="7" height="14" rx="2"/>
  </g>
</svg>