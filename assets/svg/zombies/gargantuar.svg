<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 100">
  <style>
    @keyframes stomp { 0%,100%{transform:rotate(-2deg)} 50%{transform:rotate(2deg)} }
    .body { fill:#4A4A2A; }
    .shirt { fill:#8B0000; }
    .belly { fill:#AA2222; opacity:0.4; }
    .skin { fill:#6B7B5F; }
    .wrinkle { fill:none; stroke:#5A6A4F; stroke-width:1.2; opacity:0.5; }
    .eye { fill:#fff; }
    .pupil { fill:#c00; }
    .brow { fill:none; stroke:#3A2A1A; stroke-width:2.5; }
    .mouth { fill:#2A1A0A; }
    .tooth { fill:#fff; }
    .pants { fill:#4A4A2A; }
    .shoe { fill:#3A3A1A; }
    .pole { fill:#8B8B8B; }
    .pole2 { fill:#6A6A6A; }
    .crossbar { fill:#7A7A7A; }
    .wire { fill:none; stroke:#333; stroke-width:0.8; opacity:0.5; }
    .stomp { animation: stomp 1s ease-in-out infinite; transform-origin: 40px 50px; }
  </style>
  <g class="stomp">
    <rect class="pants" x="26" y="68" width="12" height="24" rx="3"/>
    <rect class="pants" x="42" y="68" width="12" height="24" rx="3"/>
    <rect class="shoe" x="24" y="88" width="16" height="6" rx="2"/>
    <rect class="shoe" x="40" y="88" width="16" height="6" rx="2"/>
    <rect class="body" x="20" y="34" width="40" height="36" rx="4"/>
    <rect class="shirt" x="22" y="36" width="36" height="30" rx="3"/>
    <ellipse class="belly" cx="40" cy="50" rx="16" ry="10"/>
    <circle class="skin" cx="40" cy="18" r="18"/>
    <line class="wrinkle" x1="30" y1="10" x2="50" y2="10"/>
    <line class="wrinkle" x1="32" y1="14" x2="48" y2="14"/>
    <circle class="eye" cx="33" cy="16" r="5"/>
    <circle class="eye" cx="47" cy="16" r="5"/>
    <circle class="pupil" cx="34" cy="16" r="3"/>
    <circle class="pupil" cx="48" cy="16" r="3"/>
    <line class="brow" x1="28" y1="8" x2="36" y2="12"/>
    <line class="brow" x1="52" y1="8" x2="44" y2="12"/>
    <ellipse class="mouth" cx="40" cy="28" rx="7" ry="4"/>
    <rect class="tooth" x="35" y="24" width="3" height="4"/>
    <rect class="tooth" x="42" y="24" width="3" height="4"/>
    <rect class="skin" x="8" y="38" width="12" height="24" rx="4"/>
    <rect class="skin" x="60" y="34" width="12" height="20" rx="4"/>
    <rect class="pole" x="66" y="4" width="6" height="70"/>
    <rect class="pole2" x="67" y="6" width="4" height="66" opacity="0.3"/>
    <rect class="crossbar" x="60" y="6" width="20" height="4" rx="1"/>
    <rect class="crossbar" x="60" y="12" width="20" height="4" rx="1"/>
    <line class="wire" x1="60" y1="8" x2="80" y2="8"/>
  </g>
</svg>
