<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80">
  <!-- 惊吓盒僵尸 -->
  <style>
    @keyframes walk { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
    .walk { animation: walk 0.6s ease-in-out infinite; transform-origin: 30px 50px; }
  </style>
  <g class="walk">
    <!-- 头 -->
    <circle fill="#7B8B6F" cx="30" cy="18" r="14"/>
    <!-- 眼睛 -->
    <circle fill="#FFF" cx="25" cy="16" r="4"/>
    <circle fill="#FFF" cx="35" cy="16" r="4"/>
    <circle fill="#C00" cx="26" cy="16" r="2"/>
    <circle fill="#C00" cx="36" cy="16" r="2"/>
    <!-- 嘴 -->
    <ellipse cx="30" cy="24" rx="6" ry="3" fill="#4a3a2a"/>
    <!-- 身体 -->
    <rect fill="#8B6914" x="18" y="30" width="24" height="28" rx="3"/>
    <polygon fill="#6a4a0a" points="30,30 26,45 30,42 34,45"/>
    <!-- 左臂（持盒子） -->
    <rect fill="#7B8B6F" x="10" y="32" width="8" height="20" rx="3" transform="rotate(10,14,32)"/>
    <!-- 右臂 -->
    <rect fill="#7B8B6F" x="42" y="32" width="8" height="20" rx="3" transform="rotate(-15,46,32)"/>
    <!-- 左腿 -->
    <rect fill="#4a4a2a" x="20" y="56" width="8" height="18" rx="3"/>
    <rect fill="#3a3a1a" x="18" y="72" width="12" height="5" rx="2"/>
    <!-- 右腿 -->
    <rect fill="#4a4a2a" x="32" y="56" width="8" height="18" rx="3"/>
    <rect fill="#3a3a1a" x="30" y="72" width="12" height="5" rx="2"/>
    <!-- 惊吓盒 -->
    <rect fill="#FF4444" x="2" y="22" width="16" height="18" rx="3"/>
    <rect fill="#FF6666" x="4" y="24" width="10" height="8" rx="2" opacity="0.5"/>
    <rect fill="#FFCC00" x="3" y="30" width="14" height="2"/>
    <rect fill="#FFCC00" x="3" y="34" width="14" height="2"/>
    <!-- 盒子盖 -->
    <rect fill="#FF4444" x="2" y="18" width="16" height="6" rx="2"/>
    <!-- 弹簧 -->
    <polyline fill="none" stroke="#AAA" stroke-width="1.5" points="10,22 13,19 16,22 19,19"/>
    <!-- 问号 -->
    <text fill="#FFF" font-size="7" font-weight="bold" x="7" y="30">?</text>
  </g>
</svg>
