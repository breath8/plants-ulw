<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80">
  <style>
    @keyframes walk { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
    .skin { fill:#7B8B6F; }
    .shirt { fill:#8B6914; }
    .pants { fill:#4a4a2a; }
    .shoe { fill:#3a3a1a; }
    .helmet { fill:#4A4A4A; }
    .helmet2 { fill:#666; }
    .ladder { fill:#BDBDBD; }
    .rung { fill:#9E9E9E; }
    .highlight { fill:#E0E0E0; opacity:0.4; }
    .eye { fill:#fff; }
    .pupil { fill:#c00; }
    .walk { animation: walk 0.6s ease-in-out infinite; transform-origin: 30px 40px; }
  </style>
  <g class="walk">
    <circle class="skin" cx="30" cy="18" r="14"/>
    <circle class="eye" cx="25" cy="16" r="4"/>
    <circle class="eye" cx="35" cy="16" r="4"/>
    <circle class="pupil" cx="26" cy="16" r="2"/>
    <circle class="pupil" cx="36" cy="16" r="2"/>
    <ellipse cx="30" cy="24" rx="5" ry="3" fill="#4a3a2a"/>
    <rect class="helmet" x="16" y="6" width="28" height="10" rx="3"/>
    <rect class="helmet2" x="18" y="10" width="24" height="3"/>
    <rect class="shirt" x="18" y="30" width="24" height="28" rx="3"/>
    <polygon fill="#6a4a0a" points="30,30 26,45 30,42 34,45"/>
    <rect class="skin" x="10" y="32" width="8" height="18" rx="3" transform="rotate(10,14,32)"/>
    <rect class="skin" x="42" y="32" width="8" height="14" rx="3" transform="rotate(-15,46,32)"/>
    <rect class="pants" x="20" y="56" width="8" height="18" rx="3"/>
    <rect class="pants" x="32" y="56" width="8" height="18" rx="3"/>
    <rect class="shoe" x="18" y="72" width="12" height="5" rx="2"/>
    <rect class="shoe" x="30" y="72" width="12" height="5" rx="2"/>
    <rect class="ladder" x="48" y="10" width="3" height="50"/>
    <rect class="ladder" x="54" y="10" width="3" height="50"/>
    <rect class="rung" x="48" y="14" width="9" height="2.5"/>
    <rect class="rung" x="48" y="24" width="9" height="2.5"/>
    <rect class="rung" x="48" y="34" width="9" height="2.5"/>
    <rect class="rung" x="48" y="44" width="9" height="2.5"/>
    <rect class="rung" x="48" y="54" width="9" height="2.5"/>
    <rect class="highlight" x="48" y="10" width="1" height="50"/>
  </g>
</svg>
