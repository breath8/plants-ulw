<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 100">
  <style>
    @keyframes walk { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
    .skin { fill:#7B8B6F; }
    .shirt { fill:#8B6914; }
    .pants { fill:#4a4a2a; }
    .eye { fill:#fff; }
    .pupil { fill:#c00; }
    .paper { fill:#F5F5DC; stroke:#8B7355; stroke-width:1; }
    .paper-text { fill:#333; font-size:3px; }
    .walk { animation: walk 0.6s ease-in-out infinite; transform-origin: 30px 50px; }
  </style>
  <g class="walk">
    <circle class="skin" cx="30" cy="18" r="14"/>
    <circle class="eye" cx="25" cy="16" r="4"/>
    <circle class="eye" cx="35" cy="16" r="4"/>
    <circle class="pupil" cx="26" cy="16" r="2"/>
    <circle class="pupil" cx="36" cy="16" r="2"/>
    <ellipse cx="30" cy="24" rx="6" ry="3" fill="#4a3a2a"/>
    <rect class="shirt" x="18" y="30" width="24" height="28" rx="3"/>
    <polygon fill="#6a4a0a" points="30,30 26,45 30,42 34,45"/>
    <rect class="skin" x="10" y="32" width="8" height="25" rx="3" transform="rotate(10,14,32)"/>
    <rect class="skin" x="42" y="32" width="8" height="25" rx="3" transform="rotate(-15,46,32)"/>
    <rect class="pants" x="20" y="56" width="8" height="25" rx="3"/>
    <rect class="pants" x="32" y="56" width="8" height="25" rx="3"/>
    <rect fill="#3a3a1a" x="18" y="78" width="12" height="6" rx="2"/>
    <rect fill="#3a3a1a" x="30" y="78" width="12" height="6" rx="2"/>
    <rect class="paper" x="44" y="25" width="14" height="18" rx="1" transform="rotate(-5,51,34)"/>
    <line x1="46" y1="30" x2="56" y2="30" stroke="#999" stroke-width="0.5"/>
    <line x1="46" y1="33" x2="56" y2="33" stroke="#999" stroke-width="0.5"/>
    <line x1="46" y1="36" x2="56" y2="36" stroke="#999" stroke-width="0.5"/>
    <line x1="46" y1="39" x2="52" y2="39" stroke="#999" stroke-width="0.5"/>
  </g>
</svg>
