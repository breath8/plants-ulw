<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80">
  <style>
    @keyframes drive { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-1px)} }
    .body { fill:#4444AA; }
    .body-dark { fill:#3333AA; }
    .window { fill:#88BBDD; opacity:0.6; }
    .wheel { fill:#333; }
    .wheel-stripe { fill:#555; }
    .roller { fill:#444; }
    .roller-line { stroke:#666; stroke-width:0.8; }
    .skin { fill:#7B8B6F; }
    .drive { animation: drive 0.4s ease-in-out infinite; }
  </style>
  <g class="drive">
    <!-- 压路机主体 -->
    <rect class="body" x="10" y="30" width="40" height="16" rx="4"/>
    <rect class="window" x="14" y="20" width="32" height="12" rx="2"/>
    <!-- 滚轮 -->
    <rect class="roller" x="8" y="44" width="44" height="10" rx="3"/>
    <line class="roller-line" x1="12" y1="44" x2="12" y2="54"/>
    <line class="roller-line" x1="18" y1="44" x2="18" y2="54"/>
    <line class="roller-line" x1="24" y1="44" x2="24" y2="54"/>
    <line class="roller-line" x1="30" y1="44" x2="30" y2="54"/>
    <line class="roller-line" x1="36" y1="44" x2="36" y2="54"/>
    <line class="roller-line" x1="42" y1="44" x2="42" y2="54"/>
    <line class="roller-line" x1="48" y1="44" x2="48" y2="54"/>
    <!-- 僵尸头 -->
    <circle class="skin" cx="30" cy="16" r="9"/>
    <circle cx="26" cy="14" r="2.5" fill="#fff"/>
    <circle cx="34" cy="14" r="2.5" fill="#fff"/>
    <circle cx="27" cy="14" r="1.2" fill="#c00"/>
    <circle cx="35" cy="14" r="1.2" fill="#c00"/>
    <ellipse cx="30" cy="20" rx="4" ry="2" fill="#4a3a2a"/>
  </g>
</svg>